name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Build paper-service
        working-directory: services/paper-service
        run: |
          npm ci
          npm run build
      - name: Run tests
        run: |
          echo "No tests to run in CI for Go/Python placeholders"
